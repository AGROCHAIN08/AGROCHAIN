<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dealer Dashboard</title>
  <link rel="stylesheet" href="../assets/css/dealer.css">
</head>
<body>
  <div class="sidebar">
    <h2>🚛 Dealer Panel</h2>
    <button id="vehiclesBtn" class="active">🚐 Vehicle Management</button>
    <button id="browseBtn">🌾 Browse Products</button>
    <button id="cartBtn">🛒 Cart</button> <button id="ordersBtn">📦 My Orders</button>
    <button id="inventoryBtn">📋 My Inventory</button>
    <button id="profileBtn">👤 Profile</button>
    <button id="signoutBtn">🚪 Sign Out</button>
  </div>

  <div class="content">
    <section id="vehiclesSection" class="section active">
      <div class="section-header">
        <h1 class="section-title">Vehicle Management</h1>
      </div>

      <div class="vehicle-form">
        <h3>Add New Vehicle</h3>
        <form id="vehicleForm">
          <div class="form-grid">
            <div class="form-group">
              <label>Vehicle ID *</label>
              <input type="text" id="vehicleId" placeholder="e.g., AP-01-XY-1234" required>
            </div>
            <div class="form-group">
              <label>Vehicle Type *</label>
              <select id="vehicleType" required>
                <option value="">Select Vehicle Type</option>
                <option value="Reefer Truck (5 MT)">Reefer Truck (5 MT)</option>
                <option value="Insulated Van (2 MT)">Insulated Van (2 MT)</option>
                <option value="Inspection Van">Inspection Van</option>
                <option value="Heavy Truck (10 MT)">Heavy Truck (10 MT)</option>
              </select>
            </div>
            <div class="form-group">
              <label>Temperature Capacity *</label>
              <input type="text" id="temperatureCapacity" placeholder="e.g., -18°C to 0°C" required>
            </div>
          </div>
          <button type="submit" class="btn-primary">Add Vehicle</button>
        </form>
      </div>

      <div id="vehicleMessage"></div>

      <div id="vehiclesGrid" class="vehicles-grid">
        </div>
    </section>

    <section id="browseSection" class="section">
      <div class="section-header">
        <h1 class="section-title">Browse Farmer Products</h1>
      </div>

      <div class="filters">
        <div class="filters-grid">
          <div class="form-group">
            <label>Product Type</label>
            <select id="filterProductType">
              <option value="">All Types</option>
              <option value="Fruit">Fruit</option>
              <option value="Vegetable">Vegetable</option>
              <option value="Cereal">Cereal</option>
              <option value="Spices">Spices</option>
              <option value="Pulses">Pulses</option>
              <option value="Oil Seeds">Oil Seeds</option>
            </select>
          </div>
          <div class="form-group">
            <label>Variety</label>
            <input type="text" id="filterVariety" placeholder="e.g., Alphonso Mango">
          </div>
          <div class="form-group">
            <label>Max Price (₹)</label>
            <input type="number" id="filterPrice" placeholder="Enter max price">
          </div>
          <div class="form-group">
            <label>Status</label>
            <select id="filterStatus">
              <option value="">All Status</option>
              <option value="Available">Available</option>
              <option value="Inspection Initiated">Inspection Initiated</option>
            </select>
          </div>
          <div class="form-group">
            <button class="btn-primary" onclick="applyFilters()">Apply Filters</button>
          </div>
        </div>
      </div>

      <div id="browseMessage"></div>

      <div id="productsGrid" class="products-grid">
        </div>
    </section>
    
    <section id="cartSection" class="section">
        <div class="section-header">
            <h1 class="section-title">My Cart</h1>
        </div>
        <div id="cartGrid" class="cart-grid"></div>
    </section>

    <section id="ordersSection" class="section">
      <div class="section-header">
        <h1 class="section-title">My Orders</h1>
      </div>

      <div id="ordersGrid" class="orders-grid">
        </div>
    </section>

    <section id="inventorySection" class="section">
      <div class="section-header">
        <h1 class="section-title">My Inventory</h1>
      </div>
      <button class="btn-primary" id="addInventoryBtn">Add Item to Inventory</button>
      <div id="inventoryGrid" class="inventory-grid"></div>
    </section>

    <section id="profileSection" class="section">
      <div class="section-header">
        <h1 class="section-title">My Profile</h1>
      </div>
      <div id="profileInfo"></div>
    </section>
  </div>

  <div id="assignModal" class="modal">
    <div class="modal-content">
      <span class="close">&times;</span>
      <h3>Assign Vehicle for Inspection</h3>
      <div id="assignmentDetails"></div>
      <div class="form-group">
        <label>Select Vehicle</label>
        <select id="vehicleSelect">
          <option value="">Choose available vehicle...</option>
        </select>
      </div>
      <div class="form-group">
        <label>Quantity to Purchase</label>
        <input type="number" id="purchaseQuantity" placeholder="Enter quantity">
      </div>
      <button class="btn-primary" onclick="confirmAssignment()">Confirm Assignment</button>
    </div>
  </div>

  <div id="reviewModal" class="modal">
    <div class="modal-content">
      <span class="close-review">&times;</span>
      <h3>Submit Inspection Review</h3>
      <form id="reviewForm">
        <input type="hidden" id="reviewProductId">
        <input type="hidden" id="reviewOrderId">
        <input type="hidden" id="reviewFarmerId">
        <div id="reviewProductInfo"></div>
        <div class="form-group">
          <label>Quality Grade *</label>
          <select id="qualityGrade" required>
            <option value="">Select Grade</option>
            <option value="A">A (Excellent)</option>
            <option value="B">B (Good)</option>
            <option value="C">C (Average)</option>
            <option value="Rejected">Rejected</option>
          </select>
        </div>
        <div class="form-grid">
          <div class="form-group"><label>Color</label><input type="text" id="reviewColor" placeholder="e.g., Uniformly Red"></div>
          <div class="form-group"><label>Damage Level</label><select id="damageLevel"><option value="Low">Low</option><option value="Medium">Medium</option><option value="High">High</option></select></div>
          <div class="form-group"><label>Pest Infection (%)</label><input type="number" id="pestInfection" placeholder="e.g., 5" min="0" max="100"></div>
        </div>
        <div class="form-group"><label>Remarks</label><textarea id="remarks" rows="3" placeholder="Add any additional comments"></textarea></div>
        <div class="form-group"><label>Attachments (up to 5 images)</label><input type="file" id="attachments" multiple accept="image/*"></div>
        <button type="submit" class="btn-primary">Submit Review</button>
      </form>
      <div id="reviewMessage"></div>
    </div>
  </div>

  <div id="bidModal" class="modal">
    <div class="modal-content">
      <span class="close-bid">&times;</span>
      <h3>Place Your Order Bid</h3>
      <form id="bidForm">
        <input type="hidden" id="bidOrderId">
        <div id="bidProductInfo" style="background: #f8fafc; padding: 15px; border-radius: 8px; margin-bottom: 20px;"></div>
        
        <div class="form-grid">
            <div class="form-group">
                <label>Ordered Quantity *</label>
                <input type="number" id="bidQuantity" step="0.01" required>
            </div>
            <div class="form-group">
                <label>Price per Unit (₹) *</label>
                <input type="number" id="bidPricePerUnit" step="0.01" required>
            </div>
        </div>

        <div class="form-group" style="margin-top: 15px;">
            <label>Total Price (₹)</label>
            <input type="text" id="bidTotalPrice" readonly style="font-weight: bold; background: #e5e7eb;">
        </div>
        
        <div class="form-grid">
            <div class="form-group">
                <label>Expected Delivery Date *</label>
                <input type="date" id="bidDeliveryDate" required>
            </div>
            <div class="form-group">
                <label>Payment Method *</label>
                <select id="bidPaymentMethod" required>
                    <option value="">Select Method</option>
                    <option value="Cash">Cash on Delivery</option>
                    <option value="Bank Transfer">Bank Transfer</option>
                    <option value="Online">Online Payment</option>
                </select>
            </div>
        </div>
        
        <div class="form-group">
            <label>Delivery Address *</label>
            <textarea id="bidDeliveryAddress" rows="3" placeholder="Enter full delivery address" required></textarea>
        </div>
        
        <div class="form-group" style="flex-direction: row; align-items: center; gap: 10px;">
            <input type="checkbox" id="bidTerms" required style="width: auto;">
            <label for="bidTerms" style="margin-top: 0;">I agree to the terms and conditions.</label>
        </div>

        <button type="submit" class="btn-primary">Submit Bid</button>
      </form>
      <div id="bidMessage"></div>
    </div>
  </div>

  <div id="inventoryModal" class="modal">
    <div class="modal-content">
        <span class="close-inventory">&times;</span>
        <h3 id="inventoryModalTitle">Add to Inventory</h3>
        <form id="inventoryForm">
            <input type="hidden" id="inventoryItemId">
            <div class="form-group">
                <label>Product Name</label>
                <input type="text" id="inventoryProductName" required>
            </div>
            <div class="form-group">
                <label>Quantity</label>
                <input type="number" id="inventoryQuantity" required>
            </div>
            <div class="form-group">
                <label>Unit of Sale</label>
                <input type="text" id="inventoryUnitOfSale" required>
            </div>
            <div class="form-group">
                <label>Purchase Price</label>
                <input type="number" id="inventoryPurchasePrice" required>
            </div>
            <button type="submit" class="btn-primary">Save Item</button>
        </form>
    </div>
  </div>

   <script src="../assets/js/dealer.js"></script>

</body>
</html>
